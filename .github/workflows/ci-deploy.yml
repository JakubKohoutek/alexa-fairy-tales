name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            . "$NVM_DIR/nvm.sh"
            cd ~/alexa-fairy-tales
            git fetch origin
            git reset --hard origin/master
            nvm install
            npm ci
            npm run build
            sudo systemctl restart alexa-fairy-tales
            sleep 3
            systemctl is-active alexa-fairy-tales
      - name: Verify service is reachable
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://tunnel.myslenkynezastavis.cz/)
          if [ "$response" != "200" ]; then
            echo "Health check failed: got HTTP $response"
            exit 1
          fi
          echo "Health check passed: HTTP $response"
