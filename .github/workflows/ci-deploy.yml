name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            if ! command -v ffmpeg &> /dev/null; then
              echo "Installing ffmpeg..."
              sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
            fi
            export NVM_DIR="$HOME/.nvm"
            . "$NVM_DIR/nvm.sh"
            cd ~/alexa-fairy-tales
            git fetch origin
            git reset --hard origin/master
            nvm install
            npm ci
            npm run build
            rm -f ~/alexa-fairy-tales/public_media/.normalized
            rm -f ~/alexa-fairy-tales/public_media/*.tmp.mp3
            sudo systemctl restart alexa-fairy-tales
            sleep 3
            systemctl is-active alexa-fairy-tales
      - name: Verify service is reachable
        run: |
          for i in $(seq 1 30); do
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://tunnel.myslenkynezastavis.cz/)
            if [ "$response" = "200" ]; then
              echo "Health check passed: HTTP $response (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $response, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1
